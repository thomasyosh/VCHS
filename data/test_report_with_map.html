<html><body><h1>Report</h1><section id="cases-map-section" class="report-map-section"><h2>個案位置地圖</h2><p>共 1 個可定位個案</p><div id="cases-map" style="height:480px;width:100%;"></div><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" /><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script><script>window.__CASE_MAP_MARKERS__ = [{"lat": 22.4505, "lng": 114.1644, "case_no": "TC2001", "street": "Ting Kok Rd", "district": "Tai Po", "severity": "high", "status": "open"}];</script><script>(function(){  var el = document.getElementById('cases-map');  if (!el || !window.L || !window.__CASE_MAP_MARKERS__) return;  var markers = window.__CASE_MAP_MARKERS__;  var map = L.map('cases-map');  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {    maxZoom: 19, attribution: '&copy; OpenStreetMap'  }).addTo(map);  var bounds = [];  markers.forEach(function(m){    var popup = '<b>' + m.case_no + '</b><br>' + m.street + '<br>' + m.district      + '<br>嚴重程度: ' + m.severity + '<br>狀態: ' + m.status;    var mk = L.marker([m.lat, m.lng]).addTo(map).bindPopup(popup);    bounds.push(mk.getLatLng());  });  if (bounds.length) { map.fitBounds(bounds, {padding: [24, 24]}); }  else { map.setView([22.3193, 114.1694], 11); }})();</script></section></body></html>
